{% extends 'base.html' %}
{% block title %}{{ title_key }}{% endblock %}
{% block content %}
<div class="container" style="margin-top: 40px; max-width: 600px;">
  <h1 style="margin-bottom: 24px;" data-i18n="{{ title_key }}"></h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <div style="margin-top: 16px;">
      <button type="submit" class="btn btn-primary" data-i18n="save">Save</button>
      <a href="{% url 'staff-dashboard' %}" class="btn btn-outline" style="margin-left:8px;" data-i18n="cancel">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
