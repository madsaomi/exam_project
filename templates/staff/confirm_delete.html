{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="container" style="margin-top: 40px; max-width: 500px; text-align:center;">
  <h1 style="margin-bottom: 16px;">{{ title }}</h1>
  <p style="margin-bottom: 24px; color:var(--text-muted);">Are you sure you want to delete "{{ obj }}" ?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-primary" style="background:#dc2626;">Yes, delete</button>
    <a href="{% url 'staff-dashboard' %}" class="btn btn-outline">Cancel</a>
  </form>
</div>
{% endblock %}
